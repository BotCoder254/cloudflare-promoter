name: CI

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  quality:
    name: Lint, Test, Build, Bundle
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Test
        run: npm run test

      - name: Build TypeScript
        run: npm run build

      - name: Bundle action with ncc
        run: npm run bundle

      - name: Verify committed dist artifact
        run: |
          if [[ -n "$(git status --porcelain -- dist)" ]]; then
            echo "dist/ artifacts are out of date."
            echo "Run 'npm run bundle' locally and commit the result."
            git status --short -- dist
            exit 1
          fi

name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  publish:
    name: Validate and Publish Release
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run quality checks
        run: npm run check

      - name: Verify committed dist artifact
        run: |
          if [[ -n "$(git status --porcelain -- dist)" ]]; then
            echo "dist/ artifacts are out of date for this tag."
            echo "Run 'npm run bundle' and commit dist/ before tagging."
            git status --short -- dist
            exit 1
          fi

      - name: Publish GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          TAG_NAME="${GITHUB_REF_NAME}"

          if gh release view "${TAG_NAME}" > /dev/null 2>&1; then
            echo "Release ${TAG_NAME} already exists. Leaving existing release unchanged."
          else
            gh release create "${TAG_NAME}" --verify-tag --generate-notes --latest
            echo "Published release ${TAG_NAME}."
          fi
